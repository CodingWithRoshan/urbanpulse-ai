name: Deploy Backend to Cloud Run

# This file is referenced by backend/README.md ("`.github/workflows/deploy-backend.yml`
# automates the same thing via Workload Identity Federation...") but did not
# actually exist in the repo. This is the implementation of that promise.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   GCP_PROJECT_ID        e.g. "urbanpulse-ai-12345"
#   GCP_REGION            e.g. "asia-south1"
#   GCP_WIF_PROVIDER      full resource name of your Workload Identity Federation
#                         provider, e.g.
#                         "projects/123456789/locations/global/workloadIdentityPools/github/providers/github"
#   GCP_SERVICE_ACCOUNT   e.g. "urbanpulse-deployer@urbanpulse-ai-12345.iam.gserviceaccount.com"
#
# Required Secret Manager secrets in the target GCP project (created once,
# outside this workflow, e.g. via `gcloud secrets create ...`):
#   urbanpulse-gemini-api-key
#   urbanpulse-google-api-key
#   urbanpulse-openweather-api-key
#   urbanpulse-jwt-secret
#   urbanpulse-oauth-client-id
#
# The deploying service account needs these IAM roles on the project:
#   roles/run.admin, roles/iam.serviceAccountUser, roles/secretmanager.secretAccessor,
#   roles/artifactregistry.writer (or roles/storage.admin if using the legacy
#   gcr.io registry via Cloud Build's default behavior).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Byte-compile check
        run: python -m compileall app

      - name: Run tests
        run: python -m pytest -q

  deploy:
    name: Build & deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy urbanpulse-api \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production,FIRESTORE_ENABLED=true,GCS_ENABLED=true \
            --set-secrets GEMINI_API_KEY=urbanpulse-gemini-api-key:latest,GOOGLE_API_KEY=urbanpulse-google-api-key:latest,OPENWEATHER_API_KEY=urbanpulse-openweather-api-key:latest,JWT_SECRET_KEY=urbanpulse-jwt-secret:latest,GOOGLE_OAUTH_CLIENT_ID=urbanpulse-oauth-client-id:latest

      - name: Show deployed URL
        run: gcloud run services describe urbanpulse-api --project "${{ secrets.GCP_PROJECT_ID }}" --region "${{ secrets.GCP_REGION }}" --format="value(status.url)"
